name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.5.0)'
        required: true

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # 1. CI gate — re-run full checks on tag code
  # ──────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # OIDC trusted publishing は npm >= 11.5.1、.npmrc の min-release-age は
      # npm >= 11.10 が必要（未満だと未知 config 警告が stderr に出て
      # E2E の「stderr 空」検証を壊す）。両方満たす版に固定する
      - name: Pin npm
        run: npm install -g npm@11.18.0

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Lint (Biome)
        run: npx biome check cli/

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

  # ──────────────────────────────────────────────
  # 2. Publish to npm
  # ──────────────────────────────────────────────
  npm-publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Pin npm
        run: npm install -g npm@11.18.0

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Determine dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version from tag and sync publish artifacts
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version
          node scripts/sync-version.mjs
          npx tsx scripts/gen-agents-catalog.ts

      - name: Publish
        run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}

  # ──────────────────────────────────────────────
  # 3. Create GitHub Release
  # ──────────────────────────────────────────────
  github-release:
    needs: npm-publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
